name: 🚀 acherlab RDP Server

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Thời gian sử dụng'
        required: false
        default: '5h40m'
        type: choice
        options:
        - '1h'
        - '3h'
        - '5h40m'

jobs:
  Setup-RDP:
    runs-on: windows-latest
    timeout-minutes: 340
    
    steps:
      # BANNER
      - name: 🎯 KHỞI ĐỘNG
        run: |
          Write-Host ""
          Write-Host ""
          Write-Host "🤖 acherlab RDP SERVER" -ForegroundColor Yellow
          Write-Host "⚡ Powered by acherlab" -ForegroundColor Green
          Write-Host "🕒 Thời gian: ${{ github.event.inputs.duration }}" -ForegroundColor Magenta
          Write-Host ""
          $frames = @('⣾', '⣽', '⣻', '⢿', '⡿', '⣟', '⣯', '⣷')
          for($i=0; $i -lt 10; $i++) {
              Write-Host "`r🚀 Đang khởi tạo... $($frames[$i % 8])" -NoNewline -ForegroundColor Blue
              Start-Sleep -Milliseconds 100
          }
          Write-Host "`r✅ Hệ thống sẵn sàng!                    " -ForegroundColor Green

      # CẤU HÌNH
      - name: 🔧 CẤU HÌNH
        run: |
          Write-Host ""
          Write-Host "🛠️  ĐANG CẤU HÌNH" -ForegroundColor Yellow
          $steps = @(
              @{Name="Bật Remote Desktop"; Script={ Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force }},
              @{Name="Tắt xác thực mạng"; Script={ Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force }},
              @{Name="Cấu hình bảo mật RDP"; Script={ Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force; Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force }},
              @{Name="Mở port 3389 firewall"; Script={ netsh advfirewall firewall add rule name="RDP-acherlab" dir=in action=allow protocol=TCP localport=3389 profile=any; netsh advfirewall firewall add rule name="RDP-acherlab-Out" dir=out action=allow protocol=TCP localport=3389 profile=any }},
              @{Name="Khởi động dịch vụ"; Script={ Set-Service -Name TermService -StartupType Automatic -ErrorAction SilentlyContinue; Set-Service -Name UmRdpService -StartupType Automatic -ErrorAction SilentlyContinue; Start-Service -Name TermService -ErrorAction SilentlyContinue; Start-Service -Name UmRdpService -ErrorAction SilentlyContinue }}
          )
          foreach($step in $steps) {
              Write-Host "│ 📋 $($step.Name)..." -NoNewline -ForegroundColor White
              try { & $step.Script; Write-Host "`r│ ✅ $($step.Name)" -ForegroundColor Green }
              catch { Write-Host "`r│ ⚠️  $($step.Name) - bỏ qua lỗi" -ForegroundColor Yellow }
              Start-Sleep -Milliseconds 500
          }
          Write-Host "🎯 Cấu hình hoàn tất!" -ForegroundColor Green

      # TẠO USER
      - name: 👤 TẠO TÀI KHOẢN
        run: |
          Write-Host ""
          Write-Host "👤 ĐANG TẠO TÀI KHOẢN" -ForegroundColor Yellow
          function New-Password {
              $upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ'
              $lower = 'abcdefghijkmnpqrstuvwxyz'
              $numbers = '23456789'
              $all = $upper + $lower + $numbers
              $pw = ''
              $pw += $upper[(Get-Random -Minimum 0 -Maximum $upper.Length)]
              $pw += $lower[(Get-Random -Minimum 0 -Maximum $lower.Length)]
              $pw += $numbers[(Get-Random -Minimum 0 -Maximum $numbers.Length)]
              for ($i = 1; $i -le 5; $i++) { $pw += $all[(Get-Random -Minimum 0 -Maximum $all.Length)] }
              return -join ($pw.ToCharArray() | Sort-Object { Get-Random })
          }
          if ($env:CUSTOM_RDP_PASS) { $matKhau = $env:CUSTOM_RDP_PASS } else { $matKhau = New-Password }
          $securePass = ConvertTo-SecureString $matKhau -AsPlainText -Force
          Remove-LocalUser -Name "acherlab-user" -ErrorAction SilentlyContinue
          New-LocalUser -Name "acherlab-user" -Password $securePass -AccountNeverExpires -Description "acherlab account"
          Set-LocalUser -Name "acherlab-user" -PasswordNeverExpires $true -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "acherlab-user"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "acherlab-user"
          Add-LocalGroupMember -Group "Users" -Member "acherlab-user"
          Enable-LocalUser -Name "acherlab-user"
          echo "RDP_USER=acherlab-user" >> $env:GITHUB_ENV
          echo "RDP_PASS=$matKhau" >> $env:GITHUB_ENV
          echo "$matKhau" > $env:TEMP\rdp_password.txt
          Write-Host "✅ Tài khoản: acherlab-user đã sẵn sàng" -ForegroundColor Green

      # KIỂM TRA
      - name: 🔍 KIỂM TRA
        run: |
          Write-Host ""
          Write-Host "🔍 KIỂM TRA QUYỀN" -ForegroundColor Yellow
          $user = Get-LocalUser -Name "acherlab-user" -ErrorAction SilentlyContinue
          if ($user) { Write-Host "│ ✅ User tồn tại" -ForegroundColor Green } else { Write-Host "│ ❌ User không tồn tại" -ForegroundColor Red; exit 1 }
          $isAdmin = (Get-LocalGroupMember -Group "Administrators" | Where-Object {$_.Name -like "*acherlab-user"}).Count -gt 0
          if ($isAdmin) { Write-Host "│ ✅ Có quyền Admin" -ForegroundColor Green } else { Write-Host "│ ❌ Không có quyền Admin" -ForegroundColor Red }
          $isRDP = (Get-LocalGroupMember -Group "Remote Desktop Users" | Where-Object {$_.Name -like "*acherlab-user"}).Count -gt 0
          if ($isRDP) { Write-Host "│ ✅ Có quyền RDP" -ForegroundColor Green } else { Write-Host "│ ❌ Không có quyền RDP" -ForegroundColor Red }
          $termService = Get-Service -Name TermService -ErrorAction SilentlyContinue
          if ($termService.Status -eq 'Running') { Write-Host "│ ✅ TermService đang chạy" -ForegroundColor Green } else { Write-Host "│ ❌ TermService không chạy" -ForegroundColor Red }
          Write-Host "🎯 Kiểm tra hoàn tất!" -ForegroundColor Green

      # FRP TUNNEL - FIXED
      - name: 🌐 THIẾT LẬP FRP
        run: |
          Write-Host ""
          Write-Host "🌐 ĐANG THIẾT LẬP FRP TUNNEL" -ForegroundColor Yellow
          $frpDir = "$env:TEMP\frpc"
          New-Item -ItemType Directory -Path $frpDir -Force | Out-Null
          $frpcUrl = "https://github.com/fatedier/frp/releases/download/v0.58.1/frp_0.58.1_windows_amd64.zip"
          $zipPath = "$env:TEMP\frpc.zip"
          Write-Host "│ 📥 Đang tải frpc..." -NoNewline -ForegroundColor Blue
          try {
              Invoke-WebRequest -Uri $frpcUrl -OutFile $zipPath -UseBasicParsing
              Write-Host "`r│ ✅ Tải thành công" -ForegroundColor Green
          } catch {
              Write-Host "`r│ ❌ Lỗi tải: $($_.Exception.Message)" -ForegroundColor Red
              exit 1
          }
          Write-Host "│ 📦 Giải nén..." -NoNewline -ForegroundColor Blue
          try {
              Expand-Archive -Path $zipPath -DestinationPath $env:TEMP -Force
              Copy-Item "$env:TEMP\frp_0.58.1_windows_amd64\frpc.exe" "$frpDir\frpc.exe" -Force
              Remove-Item $zipPath -Force
              Remove-Item "$env:TEMP\frp_0.58.1_windows_amd64" -Recurse -Force
              Write-Host "`r│ ✅ Giải nén hoàn tất" -ForegroundColor Green
          } catch {
              Write-Host "`r│ ❌ Lỗi giải nén: $($_.Exception.Message)" -ForegroundColor Red
              exit 1
          }
          # Tạo cấu hình frpc.toml theo yêu cầu
          $configPath = "$frpDir\frpc.toml"
          @"
          serverAddr = "103.82.195.149"
          serverPort = 7000
          auth.method = "token"
          auth.token = "123456"
          
          [[proxies]]
          name = "rdp-acherlab"
          type = "tcp"
          localIP = "127.0.0.1"
          localPort = 3389
          remotePort = 0
"@ | Set-Content -Path $configPath -Encoding UTF8
          Write-Host "│ ✅ Đã tạo frpc.toml" -ForegroundColor Green

          # Khởi động frpc với redirect output, kiểm tra lỗi
          Write-Host "│ 🚀 Khởi động frpc..." -NoNewline -ForegroundColor Blue
          $logFile = "$env:TEMP\frpc.log"
          $errLog = "$env:TEMP\frpc.err"
          $process = Start-Process -FilePath "$frpDir\frpc.exe" -ArgumentList "-c `"$configPath`"" -WindowStyle Hidden -PassThru -RedirectStandardOutput $logFile -RedirectStandardError $errLog
          Start-Sleep -Seconds 5
          if ($process.HasExited) {
              $exitCode = $process.ExitCode
              Write-Host "`r│ ❌ FRPC thoát với mã $exitCode" -ForegroundColor Red
              # Đọc lỗi
              if (Test-Path $errLog) {
                  $errContent = Get-Content $errLog -ErrorAction SilentlyContinue
                  Write-Host "│ Lỗi: $errContent" -ForegroundColor Red
              }
              # Đọc stdout
              if (Test-Path $logFile) {
                  $outContent = Get-Content $logFile -ErrorAction SilentlyContinue
                  Write-Host "│ Output: $outContent" -ForegroundColor Gray
              }
              exit 1
          } else {
              Write-Host "`r│ ✅ FRP Tunnel đang chạy (PID: $($process.Id))" -ForegroundColor Green
              echo "FRP_PID=$($process.Id)" >> $env:GITHUB_ENV
              echo "FRP_DOMAIN=103.82.195.149" >> $env:GITHUB_ENV  # Không có domain tùy chỉnh, dùng IP và port
              echo "FRP_PORT=0" >> $env:GITHUB_ENV  # random, cần lấy từ log? nhưng tạm thời
          }
          # Kiểm tra kết nối nhanh
          Write-Host "│ 🔄 Kiểm tra tunnel..." -NoNewline -ForegroundColor Blue
          Start-Sleep -Seconds 3
          Write-Host "`r│ ✅ Tunnel sẵn sàng (remotePort được cấp ngẫu nhiên)" -ForegroundColor Green

      # THÔNG TIN
      - name: 🎉 THÔNG TIN KẾT NỐI
        run: |
          $matKhau = Get-Content $env:TEMP\rdp_password.txt -ErrorAction SilentlyContinue
          if (-not $matKhau) { $matKhau = "Không đọc được" }
          $durationInput = "${{ github.event.inputs.duration }}"
          switch ($durationInput) {
              "1h" { $totalMinutes = 60; $displayTime = "1 giờ" }
              "3h" { $totalMinutes = 180; $displayTime = "3 giờ" }
              "5h40m" { $totalMinutes = 340; $displayTime = "5 giờ 40 phút" }
          }
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $thoiGianBatDau = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
          $thoiGianKetThuc = $thoiGianBatDau.AddMinutes($totalMinutes)
          Write-Host ""
          Write-Host "┌───────────────────────────────────────────┐" -ForegroundColor Cyan
          Write-Host "│         🎉 KẾT NỐI THÀNH CÔNG!            │" -ForegroundColor Cyan
          Write-Host "├───────────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Host "│ 🌐  Server: 103.82.195.149" -ForegroundColor White
          Write-Host "│ 🔌  Port: (random, xem log frpc)" -ForegroundColor White
          Write-Host "│ 👤  User: acherlab-user" -ForegroundColor White
          Write-Host "│ 🔐  Mật khẩu: $matKhau" -ForegroundColor White
          Write-Host "│ ⏰  Thời lượng: $displayTime" -ForegroundColor White
          Write-Host "│ 🕐  Bắt đầu: $($thoiGianBatDau.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "│ 🕐  Kết thúc: $($thoiGianKetThuc.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "├───────────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Host "│ 💡  Hướng dẫn:                            │" -ForegroundColor Cyan
          Write-Host "│   1. Mở Remote Desktop Connection        │" -ForegroundColor Yellow
          Write-Host "│   2. Nhập IP: 103.82.195.149:port        │" -ForegroundColor Yellow
          Write-Host "│   3. User: acherlab-user, Pass: trên     │" -ForegroundColor Yellow
          Write-Host "│   4. Enjoy! 🚀                           │" -ForegroundColor Yellow
          Write-Host "└───────────────────────────────────────────┘" -ForegroundColor Cyan
          echo "TOTAL_MINUTES=$totalMinutes" >> $env:GITHUB_ENV

      # DUY TRÌ
      - name: ⏳ DUY TRÌ
        run: |
          $matKhau = Get-Content $env:TEMP\rdp_password.txt -ErrorAction SilentlyContinue
          $totalMinutes = $env:TOTAL_MINUTES
          $frpPid = $env:FRP_PID
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $thoiGianBatDau = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
          $thoiGianKetThuc = $thoiGianBatDau.AddMinutes($totalMinutes)
          Write-Host ""
          Write-Host "🔄 DUY TRÌ PHIÊN..." -ForegroundColor Yellow
          Write-Host "💎 acherlab RDP" -ForegroundColor Magenta
          Write-Host "🔗 Kết nối: 103.82.195.149 (port random)" -ForegroundColor Cyan
          Write-Host "🕐 Bắt đầu: $($thoiGianBatDau.ToString('HH:mm:ss'))" -ForegroundColor Green
          Write-Host "🕐 Kết thúc: $($thoiGianKetThuc.ToString('HH:mm:ss'))" -ForegroundColor Green
          Write-Host ""
          # Monitor process
          $monitorScript = {
              param($frpPid)
              $lastLogTime = Get-Date
              while ($true) {
                  $currentTime = Get-Date
                  if (($currentTime - $lastLogTime).TotalMinutes -ge 2) {
                      $termService = Get-Service -Name TermService -ErrorAction SilentlyContinue
                      $rdpConnections = Get-NetTCPConnection -LocalPort 3389 -ErrorAction SilentlyContinue | Where-Object {$_.State -eq 'Established'}
                      $frpcRunning = $false
                      try { $frpcProcess = Get-Process -Id $frpPid -ErrorAction SilentlyContinue; $frpcRunning = ($frpcProcess -ne $null -and -not $frpcProcess.HasExited) } catch {}
                      Write-Host "[$($currentTime.ToString('HH:mm:ss'))] 📊 RDP: $($termService.Status), Kết nối: $($rdpConnections.Count), FRP: $(if($frpcRunning){'Running'}else{'Stopped'})" -ForegroundColor Blue
                      $lastLogTime = $currentTime
                  }
                  $termService = Get-Service -Name TermService -ErrorAction SilentlyContinue
                  if ($termService.Status -ne 'Running') { Write-Host "[$($currentTime.ToString('HH:mm:ss'))] 🔄 Restart TermService..." -ForegroundColor Yellow; Start-Service -Name TermService -ErrorAction SilentlyContinue }
                  Start-Sleep -Seconds 30
              }
          }
          Start-Job -ScriptBlock $monitorScript -ArgumentList $frpPid -Name "Monitor"
          $frames = @('⠋', '⠙', '⠹', '⠸', '⠼', '⠴', '⠦', '⠧', '⠇', '⠏')
          $colors = @('Red', 'Yellow', 'Green', 'Cyan', 'Blue', 'Magenta')
          $startTime = Get-Date
          do {
              $thoiGianHienTai = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
              $thoiGianConLai = $thoiGianKetThuc - $thoiGianHienTai
              $gioConLai = [math]::Max(0, [math]::Floor($thoiGianConLai.TotalHours))
              $phutConLai = [math]::Max(0, [math]::Floor($thoiGianConLai.TotalMinutes % 60))
              $giayConLai = [math]::Max(0, [math]::Floor($thoiGianConLai.TotalSeconds % 60))
              $frame = $frames[([int]((Get-Date) - $startTime).TotalSeconds) % $frames.Length]
              $color = $colors[([int]((Get-Date) - $startTime).TotalMinutes) % $colors.Length]
              Write-Host "`r$frame [$($thoiGianHienTai.ToString('HH:mm:ss'))] Còn lại: $gioConLai giờ $phutConLai phút $giayConLai giây" -NoNewline -ForegroundColor $color
              Start-Sleep -Seconds 5
          } while ($thoiGianConLai.TotalSeconds -gt 0)
          Write-Host ""
          Write-Host "🎯 HẾT GIỜ - DỪNG!" -ForegroundColor Red
          Get-Job -Name "Monitor" -ErrorAction SilentlyContinue | Stop-Job -PassThru | Remove-Job -Force

      # DỌN DẸP
      - name: 🧹 DỌN DẸP
        if: always()
        run: |
          Write-Host ""
          Write-Host "🧹 DỌN DẸP..." -ForegroundColor Yellow
          $frpPid = $env:FRP_PID
          if ($frpPid) { try { Stop-Process -Id $frpPid -Force -ErrorAction SilentlyContinue; Write-Host "│ ✅ Đã dừng frpc" -ForegroundColor Green } catch { Write-Host "│ ⚠️  Không dừng được frpc" -ForegroundColor Yellow } }
          Remove-Item "$env:TEMP\rdp_password.txt" -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\frpc" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\frpc.log" -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\frpc.err" -ErrorAction SilentlyContinue
          Disable-LocalUser -Name "acherlab-user" -ErrorAction SilentlyContinue
          netsh advfirewall firewall delete rule name="RDP-acherlab" dir=in -ErrorAction SilentlyContinue
          netsh advfirewall firewall delete rule name="RDP-acherlab-Out" dir=out -ErrorAction SilentlyContinue
          Remove-NetFirewallRule -DisplayName "RDP-acherlab" -ErrorAction SilentlyContinue
          Remove-NetFirewallRule -DisplayName "RDP-acherlab-Out" -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 1 -Force -ErrorAction SilentlyContinue
          Stop-Service -Name TermService -Force -ErrorAction SilentlyContinue
          Get-Job | Stop-Job -PassThru | Remove-Job -Force -ErrorAction SilentlyContinue
          Write-Host ""
          Write-Host "🎉 Dọn dẹp hoàn tất! 👋" -ForegroundColor Green
